<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>红桃8 · GAY</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1a472a;
            font-family: 'Arial', 'Helvetica', sans-serif;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .watermark {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            align-content: center;
            gap: 30px 50px;
            pointer-events: none;
            opacity: 0.20;
            color: #d4af37;
            font-size: clamp(2.5rem, 10vmin, 8rem);
            font-weight: 900;
            letter-spacing: 10px;
            text-transform: uppercase;
            user-select: none;
            transform: rotate(-10deg) scale(1.2);
        }
        .watermark span {
            display: inline-block;
            white-space: nowrap;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.4);
        }

        .card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 700px;
            aspect-ratio: 2.5 / 3.5;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), inset 0 0 0 2px #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 红桃容器 */
        .hearts-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly; /* 均匀分布，避免间距过大 */
            padding: 8% 10%;  /* 增加左右内边距，避免碰到角标 */
            pointer-events: none;
        }

        .heart-row {
            display: flex;
            justify-content: space-between;
            width: 100%;
        }
        .heart-row.center {
            justify-content: center;
        }

        .heart-row span {
            color: #d32f2f;
            font-size: clamp(5rem, 20vmin, 14rem);
            line-height: 1;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.1);
            user-select: none;
        }

        /* 底部两行（第4、5行）颠倒 */
        .heart-row.reverse span {
            transform: rotate(180deg);
            display: inline-block; /* 确保旋转生效 */
        }

        /* 角标 - 放大到和心形一样大 */
        .corner {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1;
            font-weight: 900;
            color: #d32f2f;
            pointer-events: none;
            user-select: none;
        }
        .corner .number {
            font-size: clamp(5rem, 20vmin, 14rem); /* 与心形同尺寸 */
        }
        .corner .suit {
            font-size: clamp(5rem, 20vmin, 14rem); /* 同样大 */
            margin-top: -10px; /* 微调 */
        }

        .corner-tl {
            top: 20px;
            left: 24px;
        }
        .corner-br {
            bottom: 20px;
            right: 24px;
            transform: rotate(180deg);
        }

        .content {
            position: relative;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(8px);
            padding: 32px 44px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
            border: 2px solid rgba(255, 255, 255, 0.5);
            max-width: 85%;
        }

        .content h1 {
            font-size: clamp(2.2rem, 6.5vmin, 4.6rem);
            color: #1a1a1a;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.06);
            white-space: nowrap;
        }
        .content h1 .highlight {
            color: #d32f2f;
        }

        .btn-start {
            padding: 16px 60px;
            font-size: clamp(1.4rem, 3.5vmin, 2.4rem);
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #d32f2f, #b71c1c);
            border: none;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 8px 28px rgba(211, 47, 47, 0.45);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            letter-spacing: 4px;
        }
        .btn-start:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 14px 40px rgba(211, 47, 47, 0.6);
        }
        .btn-start:active {
            transform: scale(0.94);
        }
        .btn-start:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        @media (max-width: 480px) {
            .content {
                padding: 20px 20px;
                gap: 20px;
                background: rgba(255, 255, 255, 0.92);
            }
            .corner-tl {
                top: 12px;
                left: 14px;
            }
            .corner-br {
                bottom: 12px;
                right: 14px;
            }
            .content h1 {
                white-space: normal;
                text-align: center;
            }
            .watermark {
                gap: 15px 25px;
                font-size: clamp(1.5rem, 6vmin, 3.5rem);
                transform: rotate(-6deg) scale(1.1);
            }
            .hearts-container {
                padding: 6% 8%;
            }
            .heart-row span,
            .corner .number,
            .corner .suit {
                font-size: clamp(3.5rem, 14vmin, 8rem);
            }
        }
    </style>
</head>
<body>

    <div class="watermark" id="watermarkContainer"></div>

    <div class="card">

        <!-- 8颗心 2-1-2-1-2 -->
        <div class="hearts-container">
            <!-- 第1行：2颗 -->
            <div class="heart-row">
                <span>♥</span>
                <span>♥</span>
            </div>
            <!-- 第2行：1颗 -->
            <div class="heart-row center">
                <span>♥</span>
            </div>
            <!-- 第3行：2颗 -->
            <div class="heart-row">
                <span>♥</span>
                <span>♥</span>
            </div>
            <!-- 第4行：1颗（颠倒） -->
            <div class="heart-row center reverse">
                <span>♥</span>
            </div>
            <!-- 第5行：2颗（颠倒） -->
            <div class="heart-row reverse">
                <span>♥</span>
                <span>♥</span>
            </div>
        </div>

        <!-- 角标 -->
        <div class="corner corner-tl">
            <span class="number">8</span>
            <span class="suit">♥</span>
        </div>
        <div class="corner corner-br">
            <span class="number">8</span>
            <span class="suit">♥</span>
        </div>

        <div class="content">
            <h1>
                <span class="highlight">Beef</span> is a gay
            </h1>
            <button class="btn-start" id="startBtn">Start</button>
        </div>

    </div>

    <script>
        // 水印
        (function() {
            const container = document.getElementById('watermarkContainer');
            const w = window.innerWidth;
            const h = window.innerHeight;
            const count = Math.ceil((w * h) / (150 * 100)) * 2;
            for (let i = 0; i < count; i++) {
                const span = document.createElement('span');
                span.textContent = 'GAY';
                container.appendChild(span);
            }
        })();

        // Start按钮
        const startBtn = document.getElementById('startBtn');
        startBtn.addEventListener('click', function() {
            this.textContent = '🚀 加载中';
            this.disabled = true;
            setTimeout(() => {
                this.textContent = 'Start';
                this.disabled = false;
                alert('🎮 游戏启动入口已就绪！\n接下来把游戏逻辑写在这里即可。');
            }, 1500);
        });
    </script>
</body>
</html>
