<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>红桃8 · GAY</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1a472a;
            font-family: 'Arial', 'Helvetica', sans-serif;
            padding: 16px;
            position: relative;
            overflow: hidden;
        }

        /* ===== 水印 ===== */
        .watermark {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            align-content: center;
            gap: 20px 40px;
            pointer-events: none;
            opacity: 0.18;
            color: #d4af37;
            font-size: clamp(2.0rem, 7vmin, 5.5rem);
            font-weight: 900;
            letter-spacing: 8px;
            text-transform: uppercase;
            user-select: none;
            transform: rotate(-8deg) scale(1.1);
        }
        .watermark span {
            display: inline-block;
            white-space: nowrap;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.4);
        }

        /* ===== 扑克牌 ===== */
        .card {
            position: relative;
            z-index: 10;
            width: min(94vw, 650px);
            max-height: 90vh;
            aspect-ratio: 2.5 / 3.8;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), inset 0 0 0 2px #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: visible;
        }

        /* ===== 红桃8 ===== */
        .hearts-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 1.2%;
            padding: 0% 10%;
            pointer-events: none;
        }

        .heart-row {
            display: flex;
            justify-content: center;
            width: 100%;
        }
        .heart-row.two {
            gap: 18%;
        }
        .heart-row.center {
            justify-content: center;
        }

        .heart-row span {
            color: #d32f2f;
            font-size: clamp(3.8rem, 15vmin, 9rem);
            line-height: 1;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.08);
            user-select: none;
        }
        .heart-row.flip span {
            transform: rotate(180deg);
        }

        .corner {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1;
            font-weight: 900;
            color: #d32f2f;
            pointer-events: none;
            user-select: none;
        }
        .corner .number {
            font-size: clamp(2.6rem, 7.5vmin, 4.8rem);
        }
        .corner .suit {
            font-size: clamp(2.0rem, 6vmin, 4.0rem);
            margin-top: -6px;
        }

        .corner-tl {
            top: 12px;
            left: 14px;
        }
        .corner-br {
            bottom: 12px;
            right: 14px;
            transform: rotate(180deg);
        }

        /* ===== 中间内容 ===== */
        .content {
            position: relative;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(6px);
            padding: 20px 28px;
            border-radius: 16px;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.5);
            max-width: 85%;
        }

        .content h1 {
            font-size: clamp(1.8rem, 5.5vmin, 3.6rem);
            color: #1a1a1a;
            font-weight: 900;
            letter-spacing: 1px;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.06);
            white-space: nowrap;
        }
        .content h1 .highlight {
            color: #d32f2f;
        }

        .btn-start {
            padding: 12px 40px;
            font-size: clamp(1.1rem, 3.0vmin, 1.8rem);
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #d32f2f, #b71c1c);
            border: none;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(211, 47, 47, 0.4);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            letter-spacing: 3px;
        }
        .btn-start:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 30px rgba(211, 47, 47, 0.55);
        }
        .btn-start:active {
            transform: scale(0.94);
        }
        .btn-start:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* ===== 模态框（自定义弹窗） ===== */
        .modal-overlay {
            display: none; /* 默认隐藏 */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 999;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.active {
            display: flex;
        }

        .modal-box {
            background: white;
            padding: 40px 44px;
            border-radius: 24px;
            max-width: 90%;
            width: 440px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-box h2 {
            font-size: clamp(1.6rem, 4vmin, 2.4rem);
            color: #1a1a1a;
            margin-bottom: 28px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .modal-box .btn-group {
            display: flex;
            justify-content: center;
            gap: 24px;
        }

        .modal-box .btn-group button {
            padding: 12px 36px;
            font-size: clamp(1.2rem, 3vmin, 1.8rem);
            font-weight: bold;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            min-width: 100px;
        }

        .modal-box .btn-yes {
            background: linear-gradient(135deg, #43a047, #2e7d32);
            color: white;
            box-shadow: 0 6px 20px rgba(67, 160, 71, 0.4);
        }
        .modal-box .btn-yes:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 10px 30px rgba(67, 160, 71, 0.55);
        }
        .modal-box .btn-no {
            background: linear-gradient(135deg, #e53935, #b71c1c);
            color: white;
            box-shadow: 0 6px 20px rgba(229, 57, 53, 0.4);
        }
        .modal-box .btn-no:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 10px 30px rgba(229, 57, 53, 0.55);
        }
        .modal-box .btn-group button:active {
            transform: scale(0.94);
        }

        /* ===== 手机适配 ===== */
        @media (max-width: 480px) {
            .content {
                padding: 16px 18px;
                gap: 16px;
                background: rgba(255, 255, 255, 0.92);
            }
            .corner-tl {
                top: 8px;
                left: 10px;
            }
            .corner-br {
                bottom: 8px;
                right: 10px;
            }
            .content h1 {
                white-space: normal;
                text-align: center;
                font-size: clamp(1.6rem, 5vmin, 3.0rem);
            }
            .btn-start {
                font-size: clamp(1.0rem, 2.8vmin, 1.6rem);
                padding: 10px 28px;
            }
            .watermark {
                gap: 12px 20px;
                font-size: clamp(1.6rem, 5vmin, 3.2rem);
                transform: rotate(-5deg) scale(1.1);
            }
            .hearts-container {
                padding: 0% 6%;
                gap: 1.0%;
            }
            .heart-row span {
                font-size: clamp(3.0rem, 13vmin, 6.5rem);
            }
            .corner .number {
                font-size: clamp(2.0rem, 5.5vmin, 3.6rem);
            }
            .corner .suit {
                font-size: clamp(1.6rem, 4.5vmin, 3.0rem);
            }
            .heart-row.two {
                gap: 15%;
            }

            .modal-box {
                padding: 30px 24px;
                width: 90%;
            }
            .modal-box .btn-group {
                flex-direction: column;
                gap: 16px;
                align-items: center;
            }
            .modal-box .btn-group button {
                width: 100%;
                min-width: unset;
            }
        }
    </style>
</head>
<body>

    <!-- ===== 水印 ===== -->
    <div class="watermark" id="watermarkContainer"></div>

    <!-- ===== 扑克牌 ===== -->
    <div class="card">

        <div class="hearts-container">
            <div class="heart-row two">
                <span>♥</span>
                <span>♥</span>
            </div>
            <div class="heart-row center">
                <span>♥</span>
            </div>
            <div class="heart-row two">
                <span>♥</span>
                <span>♥</span>
            </div>
            <div class="heart-row center flip">
                <span>♥</span>
            </div>
            <div class="heart-row two flip">
                <span>♥</span>
                <span>♥</span>
            </div>
        </div>

        <div class="corner corner-tl">
            <span class="number">8</span>
            <span class="suit">♥</span>
        </div>
        <div class="corner corner-br">
            <span class="number">8</span>
            <span class="suit">♥</span>
        </div>

        <div class="content">
            <h1>
                <span class="highlight">Beef</span> is a gay
            </h1>
            <button class="btn-start" id="startBtn">Start</button>
        </div>

    </div>

    <!-- ===== 模态框（弹窗） ===== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">
            <h2>Do you think Beef is a gay?</h2>
            <div class="btn-group">
                <button class="btn-yes" id="modalYes">Yes</button>
                <button class="btn-no" id="modalNo">No</button>
            </div>
        </div>
    </div>

    <script>
        // ===== 生成水印 =====
        (function() {
            const container = document.getElementById('watermarkContainer');
            const w = window.innerWidth;
            const h = window.innerHeight;
            const count = Math.ceil((w * h) / (120 * 80)) * 2;
            for (let i = 0; i < count; i++) {
                const span = document.createElement('span');
                span.textContent = 'GAY';
                container.appendChild(span);
            }
        })();

        // ===== 获取元素 =====
        const startBtn = document.getElementById('startBtn');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalYes = document.getElementById('modalYes');
        const modalNo = document.getElementById('modalNo');

        // ===== 显示模态框 =====
        function showModal() {
            modalOverlay.classList.add('active');
        }

        // ===== 隐藏模态框 =====
        function hideModal() {
            modalOverlay.classList.remove('active');
        }

        // ===== Start 按钮点击事件 =====
        startBtn.addEventListener('click', function() {
            // 可以添加一点按钮反馈（可选）
            // 直接显示模态框
            showModal();
        });

        // ===== Yes 按钮 =====
        modalYes.addEventListener('click', function() {
            hideModal();
            // 你可以在这里添加 Yes 的逻辑，比如跳转或记录
            alert('你选择了 Yes 🏳️‍🌈');
            // 也可以把按钮改个状态，例如 startBtn.textContent = '已投票 Yes';
        });

        // ===== No 按钮 =====
        modalNo.addEventListener('click', function() {
            hideModal();
            alert('你选择了 No ❌');
        });

        // ===== 点击模态框外部关闭（可选） =====
        modalOverlay.addEventListener('click', function(e) {
            if (e.target === modalOverlay) {
                hideModal();
            }
        });
    </script>

</body>
</html>
