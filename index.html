<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>红桃8 · GAY 背景</title>
    <style>
        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ===== 网页主体：撑满全屏，并作为背景水印的容器 ===== */
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1a472a; /* 墨绿色桌布底色（扑克牌外可见） */
            font-family: 'Arial', 'Helvetica', sans-serif;
            padding: 20px;
            /* 保证水印铺满整个视口 */
            position: relative;
            overflow: hidden;
        }

        /* ===== 背景水印：“GAY” 铺满平面 ===== */
        .watermark {
            position: fixed;          /* 固定在视口，不随滚动 */
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;              /* 放在最底层 */
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            align-content: center;    /* 多行居中 */
            gap: 20px 40px;          /* 文字间距，可调 */
            pointer-events: none;     /* 让鼠标穿透，不影响点击按钮 */
            opacity: 0.20;           /* 透明度，隐约可见 */
            color: #d4af37;          /* 金色，与绿桌布搭配 */
            font-size: clamp(2rem, 8vmin, 6rem);
            font-weight: 900;
            letter-spacing: 8px;
            text-transform: uppercase;
            user-select: none;
            /* 使用旋转增加设计感（可选） */
            transform: rotate(-8deg) scale(1.2);
        }
        /* 每个“GAY”文字独立块（用于布局） */
        .watermark span {
            display: inline-block;
            white-space: nowrap;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        /* ===== 扑克牌卡片 ===== */
        .card {
            position: relative;
            z-index: 10;              /* 浮在水印之上 */
            width: 100%;
            max-width: 700px;
            aspect-ratio: 2.5 / 3.5;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), inset 0 0 0 2px #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            /* 内部的绝对定位元素相对此容器定位 */
        }

        /* ===== 红桃8 的 8 颗心 ===== */
        .hearts-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: grid;
            /* 3行，每行4列（但第一和第三行只占中间两列） */
            grid-template-columns: 1fr 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
            justify-items: center;
            align-items: center;
            padding: 14% 8%;          /* 上下左右留白，让心形不贴边 */
            pointer-events: none;     /* 让鼠标穿透 */
            gap: 2%;                  /* 行/列间距微调 */
        }

        /* 每颗心共用样式 */
        .hearts-grid span {
            color: #d32f2f;
            font-size: clamp(3rem, 10vmin, 6.5rem);
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.08);
            line-height: 1;
            user-select: none;
        }

        /* 第一行：只占第2和第3列（即中间两列） */
        .hearts-grid .row1 {
            grid-row: 1;
            grid-column: 2 / 4;       /* 从第2列开始，跨2列，居中 */
            display: flex;
            justify-content: space-evenly; /* 两颗心分散 */
            width: 100%;
        }
        /* 第二行：占满4列，放置4颗心 */
        .hearts-grid .row2 {
            grid-row: 2;
            grid-column: 1 / 5;
            display: flex;
            justify-content: space-evenly;
            width: 100%;
        }
        /* 第三行：同第一行，只占中间两列 */
        .hearts-grid .row3 {
            grid-row: 3;
            grid-column: 2 / 4;
            display: flex;
            justify-content: space-evenly;
            width: 100%;
        }

        /* 每一行内的每颗心 */
        .hearts-grid .row1 span,
        .hearts-grid .row2 span,
        .hearts-grid .row3 span {
            font-size: clamp(3rem, 10vmin, 6.5rem);
        }

        /* ===== 左上角和右下角的“8♥”标记 ===== */
        .corner {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1;
            font-weight: 900;
            color: #d32f2f;
            pointer-events: none;
            user-select: none;
        }
        .corner .number {
            font-size: clamp(2.8rem, 7vmin, 5.5rem);
        }
        .corner .suit {
            font-size: clamp(2.0rem, 5vmin, 4.0rem);
            margin-top: -6px;
        }

        .corner-tl {
            top: 18px;
            left: 22px;
        }
        .corner-br {
            bottom: 18px;
            right: 22px;
            transform: rotate(180deg);
        }

        /* ===== 中间内容 ===== */
        .content {
            position: relative;
            z-index: 20;              /* 在最上层 */
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            padding: 34px 48px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
            border: 2px solid rgba(255, 255, 255, 0.5);
            max-width: 85%;
        }

        .content h1 {
            font-size: clamp(2rem, 6vmin, 4.2rem);
            color: #1a1a1a;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.06);
            white-space: nowrap;
        }
        .content h1 .highlight {
            color: #d32f2f;
        }

        .btn-start {
            padding: 16px 56px;
            font-size: clamp(1.3rem, 3.2vmin, 2.2rem);
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #d32f2f, #b71c1c);
            border: none;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 8px 28px rgba(211, 47, 47, 0.45);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            letter-spacing: 4px;
        }
        .btn-start:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 14px 40px rgba(211, 47, 47, 0.6);
        }
        .btn-start:active {
            transform: scale(0.94);
        }
        .btn-start:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* ===== 手机适配 ===== */
        @media (max-width: 480px) {
            .content {
                padding: 22px 24px;
                gap: 22px;
                background: rgba(255, 255, 255, 0.92);
            }
            .corner-tl {
                top: 12px;
                left: 14px;
            }
            .corner-br {
                bottom: 12px;
                right: 14px;
            }
            .content h1 {
                white-space: normal;
                text-align: center;
            }
            .watermark {
                gap: 12px 20px;
                font-size: clamp(1.2rem, 5vmin, 3rem);
                transform: rotate(-6deg) scale(1.1);
            }
            .hearts-grid {
                padding: 10% 4%;
                gap: 1%;
            }
            .hearts-grid .row1 span,
            .hearts-grid .row2 span,
            .hearts-grid .row3 span {
                font-size: clamp(2rem, 8vmin, 4rem);
            }
        }
    </style>
</head>
<body>

    <!-- ===== 背景水印：铺满的“GAY” ===== -->
    <div class="watermark" id="watermarkContainer">
        <!-- 由 JavaScript 生成大量“GAY” -->
    </div>

    <!-- ===== 扑克牌 ===== -->
    <div class="card">

        <!-- 红桃8 网格 -->
        <div class="hearts-grid">
            <!-- 第一行：2颗心（第2、3列） -->
            <div class="row1">
                <span>♥</span>
                <span>♥</span>
            </div>
            <!-- 第二行：4颗心（占满4列） -->
            <div class="row2">
                <span>♥</span>
                <span>♥</span>
                <span>♥</span>
                <span>♥</span>
            </div>
            <!-- 第三行：2颗心（第2、3列） -->
            <div class="row3">
                <span>♥</span>
                <span>♥</span>
            </div>
        </div>

        <!-- 左上角标记 -->
        <div class="corner corner-tl">
            <span class="number">8</span>
            <span class="suit">♥</span>
        </div>
        <!-- 右下角标记 -->
        <div class="corner corner-br">
            <span class="number">8</span>
            <span class="suit">♥</span>
        </div>

        <!-- 中间内容 -->
        <div class="content">
            <h1>
                <span class="highlight">Beef</span> is a gay
            </h1>
            <button class="btn-start" id="startBtn">Start</button>
        </div>

    </div>

    <script>
        // ===== 1. 生成背景水印 “GAY” =====
        (function createWatermark() {
            const container = document.getElementById('watermarkContainer');
            // 根据视口面积估算需要多少个“GAY”，确保铺满
            const width = window.innerWidth;
            const height = window.innerHeight;
            // 每个“GAY”大约占宽120px，高80px（取决于字体大小），我们生成足够数量
            const count = Math.ceil((width * height) / (120 * 80)) * 2; // 加一倍确保覆盖
            for (let i = 0; i < count; i++) {
                const span = document.createElement('span');
                span.textContent = 'GAY';
                container.appendChild(span);
            }
        })();

        // ===== 2. Start 按钮交互 =====
        const startBtn = document.getElementById('startBtn');
        startBtn.addEventListener('click', function() {
            this.textContent = '🚀 加载中';
            this.disabled = true;
            setTimeout(() => {
                this.textContent = 'Start';
                this.disabled = false;
                alert('🎮 游戏启动入口已就绪！\n接下来把游戏逻辑写在这里即可。');
            }, 1500);
        });

        // ===== 3. 窗口尺寸变化时重新生成水印（可选） =====
        // 为了简单，不监听resize，否则会频繁刷新，影响性能。
        // 如果觉得不够密，可以手动调整上面 count 乘数。
    </script>
</body>
</html>
