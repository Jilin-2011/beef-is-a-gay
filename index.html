<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>红桃8 · GAY</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1a472a;
            font-family: 'Arial', 'Helvetica', sans-serif;
            padding: 16px;
            position: relative;
            overflow: hidden;
        }

        .watermark {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            align-content: center;
            gap: 20px 40px;
            pointer-events: none;
            opacity: 0.18;
            color: #d4af37;
            font-size: clamp(2.0rem, 7vmin, 5.5rem);
            font-weight: 900;
            letter-spacing: 8px;
            text-transform: uppercase;
            user-select: none;
            transform: rotate(-8deg) scale(1.1);
        }
        .watermark span {
            display: inline-block;
            white-space: nowrap;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.4);
        }

        .card {
            position: relative;
            z-index: 10;
            width: min(94vw, 650px);
            max-height: 90vh;
            aspect-ratio: 2.5 / 3.8;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), inset 0 0 0 2px #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: visible;
        }

        .hearts-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 1.2%;                     /* 稍微缩小行间距，给大心腾空间 */
            padding: 0% 10%;               /* 左右内边距略减，让心更舒展 */
            pointer-events: none;
        }

        .heart-row {
            display: flex;
            justify-content: center;
            width: 100%;
        }
        .heart-row.two {
            gap: 18%;
        }
        .heart-row.center {
            justify-content: center;
        }

        /* ===== 红桃尺寸大幅增大 ===== */
        .heart-row span {
            color: #d32f2f;
            font-size: clamp(3.8rem, 15vmin, 9rem);   /* 从 6.8rem 增大到 9rem */
            line-height: 1;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.08);
            user-select: none;
        }
        .heart-row.flip span {
            transform: rotate(180deg);
        }

        /* 角落数字和红桃也稍微放大，保持协调 */
        .corner {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1;
            font-weight: 900;
            color: #d32f2f;
            pointer-events: none;
            user-select: none;
        }
        .corner .number {
            font-size: clamp(2.6rem, 7.5vmin, 4.8rem);
        }
        .corner .suit {
            font-size: clamp(2.0rem, 6vmin, 4.0rem);
            margin-top: -6px;
        }

        .corner-tl {
            top: 12px;
            left: 14px;
        }
        .corner-br {
            bottom: 12px;
            right: 14px;
            transform: rotate(180deg);
        }

        .content {
            position: relative;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(6px);
            padding: 20px 28px;
            border-radius: 16px;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.5);
            max-width: 85%;
        }

        .content h1 {
            font-size: clamp(1.8rem, 5.5vmin, 3.6rem);
            color: #1a1a1a;
            font-weight: 900;
            letter-spacing: 1px;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.06);
            white-space: nowrap;
        }
        .content h1 .highlight {
            color: #d32f2f;
        }

        .btn-start {
            padding: 12px 40px;
            font-size: clamp(1.1rem, 3.0vmin, 1.8rem);
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #d32f2f, #b71c1c);
            border: none;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(211, 47, 47, 0.4);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            letter-spacing: 3px;
        }
        .btn-start:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 30px rgba(211, 47, 47, 0.55);
        }
        .btn-start:active {
            transform: scale(0.94);
        }
        .btn-start:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* ===== 手机适配 ===== */
        @media (max-width: 480px) {
            .content {
                padding: 16px 18px;
                gap: 16px;
                background: rgba(255, 255, 255, 0.92);
            }
            .corner-tl {
                top: 8px;
                left: 10px;
            }
            .corner-br {
                bottom: 8px;
                right: 10px;
            }
            .content h1 {
                white-space: normal;
                text-align: center;
                font-size: clamp(1.6rem, 5vmin, 3.0rem);
            }
            .btn-start {
                font-size: clamp(1.0rem, 2.8vmin, 1.6rem);
                padding: 10px 28px;
            }
            .watermark {
                gap: 12px 20px;
                font-size: clamp(1.6rem, 5vmin, 3.2rem);
                transform: rotate(-5deg) scale(1.1);
            }
            .hearts-container {
                padding: 0% 6%;           /* 手机左右内边距再缩小 */
                gap: 1.0%;
            }
            .heart-row span {
                font-size: clamp(3.0rem, 13vmin, 6.5rem); /* 手机上依然大 */
            }
            .corner .number {
                font-size: clamp(2.0rem, 5.5vmin, 3.6rem);
            }
            .corner .suit {
                font-size: clamp(1.6rem, 4.5vmin, 3.0rem);
            }
            .heart-row.two {
                gap: 15%;
            }
        }
    </style>
</head>
<body>

    <div class="watermark" id="watermarkContainer"></div>

    <div class="card">

        <div class="hearts-container">
            <div class="heart-row two">
                <span>♥</span>
                <span>♥</span>
            </div>
            <div class="heart-row center">
                <span>♥</span>
            </div>
            <div class="heart-row two">
                <span>♥</span>
                <span>♥</span>
            </div>
            <div class="heart-row center flip">
                <span>♥</span>
            </div>
            <div class="heart-row two flip">
                <span>♥</span>
                <span>♥</span>
            </div>
        </div>

        <div class="corner corner-tl">
            <span class="number">8</span>
            <span class="suit">♥</span>
        </div>
        <div class="corner corner-br">
            <span class="number">8</span>
            <span class="suit">♥</span>
        </div>

        <div class="content">
            <h1>
                <span class="highlight">Beef</span> is a gay
            </h1>
            <button class="btn-start" id="startBtn">Start</button>
        </div>

    </div>

    <script>
        (function() {
            const container = document.getElementById('watermarkContainer');
            const w = window.innerWidth;
            const h = window.innerHeight;
            const count = Math.ceil((w * h) / (120 * 80)) * 2;
            for (let i = 0; i < count; i++) {
                const span = document.createElement('span');
                span.textContent = 'GAY';
                container.appendChild(span);
            }
        })();

        const startBtn = document.getElementById('startBtn');
        startBtn.addEventListener('click', function() {
            this.textContent = '🚀 加载中';
            this.disabled = true;
            setTimeout(() => {
                this.textContent = 'Start';
                this.disabled = false;
                alert('🎮 游戏启动入口已就绪！\n接下来把游戏逻辑写在这里即可。');
            }, 1500);
        });
    </script>
</body>
</html>
